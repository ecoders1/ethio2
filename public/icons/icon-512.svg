      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Graduation cap -->
  <polygon points="256,90 420,160 256,230 92,160" fill="white" opacity="0.15"/>
