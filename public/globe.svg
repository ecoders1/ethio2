<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="globeGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#052e16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="capGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <ellipse cx="400" cy="290" rx="380" ry="280" fill="url(#globeGlow)"/>
  <ellipse cx="400" cy="220" rx="160" ry="130" fill="url(#capGlow)"/>

  <!-- ── Globe ── -->
  <g transform="translate(400,310)" opacity="0.14">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- Equator -->
    <ellipse cx="0" cy="0" rx="130" ry="40" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <!-- Tropic lines -->
    <ellipse cx="0" cy="-55" rx="116" ry="30" fill="none" stroke="#ffffff" stroke-width="1"/>
    <ellipse cx="0" cy="55"  rx="116" ry="30" fill="none" stroke="#ffffff" stroke-width="1"/>
    <!-- Meridians -->
    <ellipse cx="0" cy="0" rx="50"  ry="130" fill="none" stroke="#ffffff" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="100" ry="130" fill="none" stroke="#ffffff" stroke-width="1"/>
    <!-- Vertical axis -->
    <line x1="0" y1="-130" x2="0" y2="130" stroke="#ffffff" stroke-width="1.2"/>
    <!-- Stand -->
    <line x1="0" y1="130" x2="0" y2="160" stroke="#ffffff" stroke-width="3"/>
    <ellipse cx="0" cy="160" rx="40" ry="8" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- ── Graduation Cap (center-top) ── -->
  <g transform="translate(400,185)" opacity="0.20">
    <!-- Board -->
    <polygon points="0,-52 140,0 0,52 -140,0" fill="#ffffff"/>
    <polygon points="0,-52 140,0 0,0 -140,0" fill="#dcfce7" opacity="0.5"/>
    <!-- Hat body -->
    <rect x="-50" y="0" width="100" height="52" rx="5" fill="#ffffff" opacity="0.9"/>
    <!-- Hat top -->
    <rect x="-50" y="-8" width="100" height="10" rx="3" fill="#e2e8f0" opacity="0.8"/>
    <!-- Tassel cord -->
    <line x1="140" y1="0" x2="140" y2="72" stroke="#fbbf24" stroke-width="3.5"/>
    <circle cx="140" cy="72" r="7" fill="#fbbf24"/>
    <!-- Tassel fringe -->
    <line x1="133" y1="72" x2="126" y2="95" stroke="#fbbf24" stroke-width="2.2"/>
    <line x1="140" y1="74" x2="140" y2="97" stroke="#fbbf24" stroke-width="2.2"/>
    <line x1="147" y1="72" x2="154" y2="95" stroke="#fbbf24" stroke-width="2.2"/>
  </g>

  <!-- ── App name watermark ── -->
  <text x="400" y="510" font-family="Arial Black, sans-serif" font-size="28"
    font-weight="900" fill="#ffffff" text-anchor="middle" opacity="0.15"
    letter-spacing="4">EXIT EXAM ETHIOPIA</text>

  <!-- ── Small floating caps ── -->
  <g transform="translate(95,95) rotate(-18) scale(0.30)" opacity="0.11">
    <polygon points="0,-44 120,0 0,44 -120,0" fill="#ffffff"/>
    <rect x="-44" y="0" width="88" height="44" rx="4" fill="#ffffff"/>
    <line x1="120" y1="0" x2="120" y2="58" stroke="#fbbf24" stroke-width="4"/>
    <circle cx="120" cy="58" r="7" fill="#fbbf24"/>
  </g>
  <g transform="translate(700,80) rotate(14) scale(0.26)" opacity="0.09">
    <polygon points="0,-44 120,0 0,44 -120,0" fill="#ffffff"/>
    <rect x="-44" y="0" width="88" height="44" rx="4" fill="#ffffff"/>
    <line x1="120" y1="0" x2="120" y2="58" stroke="#fbbf24" stroke-width="4"/>
    <circle cx="120" cy="58" r="7" fill="#fbbf24"/>
  </g>
  <g transform="translate(70,470) rotate(22) scale(0.25)" opacity="0.09">
    <polygon points="0,-44 120,0 0,44 -120,0" fill="#ffffff"/>
    <rect x="-44" y="0" width="88" height="44" rx="4" fill="#ffffff"/>
    <line x1="120" y1="0" x2="120" y2="58" stroke="#fbbf24" stroke-width="4"/>
    <circle cx="120" cy="58" r="7" fill="#fbbf24"/>
  </g>
  <g transform="translate(715,465) rotate(-10) scale(0.28)" opacity="0.09">
    <polygon points="0,-44 120,0 0,44 -120,0" fill="#ffffff"/>
    <rect x="-44" y="0" width="88" height="44" rx="4" fill="#ffffff"/>
    <line x1="120" y1="0" x2="120" y2="58" stroke="#fbbf24" stroke-width="4"/>
    <circle cx="120" cy="58" r="7" fill="#fbbf24"/>
  </g>

  <!-- ── Concentric rings ── -->
  <circle cx="400" cy="300" r="190" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  <circle cx="400" cy="300" r="260" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <circle cx="400" cy="300" r="330" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.03"/>

  <!-- ── Stars ── -->
  <circle cx="185" cy="175" r="2"   fill="#ffffff" opacity="0.28"/>
  <circle cx="600" cy="145" r="2.5" fill="#ffffff" opacity="0.22"/>
  <circle cx="660" cy="370" r="2"   fill="#ffffff" opacity="0.18"/>
  <circle cx="145" cy="360" r="2"   fill="#ffffff" opacity="0.22"/>
  <circle cx="310" cy="500" r="2"   fill="#ffffff" opacity="0.18"/>
  <circle cx="510" cy="490" r="2"   fill="#ffffff" opacity="0.18"/>
  <circle cx="750" cy="230" r="2"   fill="#ffffff" opacity="0.18"/>
  <circle cx="48"  cy="240" r="2"   fill="#ffffff" opacity="0.18"/>
  <circle cx="370" cy="70"  r="1.5" fill="#fbbf24" opacity="0.35"/>
  <circle cx="430" cy="60"  r="1.5" fill="#fbbf24" opacity="0.30"/>

  <!-- ── Ethiopian flag stripe ── -->
  <rect x="0"   y="572" width="267" height="28" fill="#16a34a" opacity="0.65"/>
  <rect x="267" y="572" width="266" height="28" fill="#fbbf24" opacity="0.65"/>
  <rect x="533" y="572" width="267" height="28" fill="#dc2626" opacity="0.65"/>
</svg>
