<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#052e16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="capGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background glows -->
  <ellipse cx="400" cy="280" rx="380" ry="270" fill="url(#glow1)"/>
  <ellipse cx="400" cy="180" rx="200" ry="150" fill="url(#capGlow)"/>

  <!-- ══ LARGE GRADUATION CAP (center) ══ -->
  <g transform="translate(400,170)">
    <!-- Mortarboard top (diamond shape) -->
    <polygon points="0,-60 160,0 0,60 -160,0"
      fill="white" opacity="0.22"/>
    <!-- Top shine -->
    <polygon points="0,-60 160,0 0,0 -160,0"
      fill="white" opacity="0.10"/>
    <!-- Cap body (cylinder) -->
    <rect x="-55" y="0" width="110" height="62" rx="6"
      fill="white" opacity="0.20"/>
    <!-- Cap top flat rim -->
    <rect x="-55" y="-6" width="110" height="12" rx="3"
      fill="white" opacity="0.15"/>
    <!-- Tassel cord -->
    <line x1="160" y1="0" x2="160" y2="80"
      stroke="#fbbf24" stroke-width="4" opacity="0.9"/>
    <!-- Tassel knot -->
    <circle cx="160" cy="80" r="8"
      fill="#fbbf24" opacity="0.9"/>
    <!-- Tassel fringe -->
    <line x1="150" y1="80" x2="142" y2="108" stroke="#fbbf24" stroke-width="3" opacity="0.8"/>
    <line x1="157" y1="82" x2="155" y2="112" stroke="#fbbf24" stroke-width="3" opacity="0.8"/>
    <line x1="163" y1="82" x2="165" y2="112" stroke="#fbbf24" stroke-width="3" opacity="0.8"/>
    <line x1="170" y1="80" x2="178" y2="108" stroke="#fbbf24" stroke-width="3" opacity="0.8"/>
  </g>

  <!-- ══ DIPLOMA SCROLL (below cap) ══ -->
  <g transform="translate(400,340)" opacity="0.16">
    <!-- Scroll body -->
    <rect x="-80" y="0" width="160" height="50" rx="6" fill="white"/>
    <!-- Left curl -->
    <ellipse cx="-80" cy="25" rx="12" ry="25" fill="white"/>
    <!-- Right curl -->
    <ellipse cx="80"  cy="25" rx="12" ry="25" fill="white"/>
    <!-- Ribbon band -->
    <rect x="-80" y="20" width="160" height="10" fill="#fbbf24" opacity="0.6"/>
    <!-- Text lines on diploma -->
    <rect x="-50" y="8"  width="100" height="4" rx="2" fill="#16a34a" opacity="0.5"/>
    <rect x="-35" y="16" width="70"  height="3" rx="2" fill="#16a34a" opacity="0.4"/>
    <rect x="-40" y="33" width="80"  height="3" rx="2" fill="#16a34a" opacity="0.4"/>
    <rect x="-25" y="40" width="50"  height="3" rx="2" fill="#16a34a" opacity="0.3"/>
  </g>

  <!-- ══ APP NAME TEXT ══ -->
  <text x="400" y="430"
    font-family="Arial Black, sans-serif"
    font-size="38" font-weight="900"
    fill="#ffffff" text-anchor="middle"
    opacity="0.22" letter-spacing="2">
    EXIT EXAM ETHIOPIA
  </text>
  <text x="400" y="460"
    font-family="Arial, sans-serif"
    font-size="16" font-weight="400"
    fill="#ffffff" text-anchor="middle"
    opacity="0.14" letter-spacing="4">
    PREPARE · PRACTICE · PASS
  </text>

  <!-- ══ SMALL FLOATING CAPS (corners) ══ -->
  <!-- Top-left -->
  <g transform="translate(90,88) rotate(-18) scale(0.28)" opacity="0.11">
    <polygon points="0,-44 120,0 0,44 -120,0" fill="white"/>
    <rect x="-44" y="0" width="88" height="44" rx="4" fill="white"/>
    <line x1="120" y1="0" x2="120" y2="62" stroke="#fbbf24" stroke-width="5"/>
    <circle cx="120" cy="62" r="8" fill="#fbbf24"/>
  </g>
  <!-- Top-right -->
  <g transform="translate(710,75) rotate(12) scale(0.25)" opacity="0.09">
    <polygon points="0,-44 120,0 0,44 -120,0" fill="white"/>
    <rect x="-44" y="0" width="88" height="44" rx="4" fill="white"/>
    <line x1="120" y1="0" x2="120" y2="62" stroke="#fbbf24" stroke-width="5"/>
    <circle cx="120" cy="62" r="8" fill="#fbbf24"/>
  </g>
  <!-- Bottom-left -->
  <g transform="translate(65,475) rotate(20) scale(0.24)" opacity="0.09">
    <polygon points="0,-44 120,0 0,44 -120,0" fill="white"/>
    <rect x="-44" y="0" width="88" height="44" rx="4" fill="white"/>
    <line x1="120" y1="0" x2="120" y2="62" stroke="#fbbf24" stroke-width="5"/>
    <circle cx="120" cy="62" r="8" fill="#fbbf24"/>
  </g>
  <!-- Bottom-right -->
  <g transform="translate(720,470) rotate(-10) scale(0.26)" opacity="0.09">
    <polygon points="0,-44 120,0 0,44 -120,0" fill="white"/>
    <rect x="-44" y="0" width="88" height="44" rx="4" fill="white"/>
    <line x1="120" y1="0" x2="120" y2="62" stroke="#fbbf24" stroke-width="5"/>
    <circle cx="120" cy="62" r="8" fill="#fbbf24"/>
  </g>

  <!-- ══ CONCENTRIC RINGS ══ -->
  <circle cx="400" cy="300" r="200" fill="none" stroke="white" stroke-width="1" opacity="0.05"/>
  <circle cx="400" cy="300" r="270" fill="none" stroke="white" stroke-width="1" opacity="0.04"/>
  <circle cx="400" cy="300" r="340" fill="none" stroke="white" stroke-width="1" opacity="0.03"/>

  <!-- ══ STARS / SPARKLES ══ -->
  <circle cx="180" cy="160" r="2.5" fill="white" opacity="0.30"/>
  <circle cx="610" cy="140" r="2"   fill="white" opacity="0.24"/>
  <circle cx="670" cy="360" r="2"   fill="white" opacity="0.18"/>
  <circle cx="140" cy="370" r="2"   fill="white" opacity="0.22"/>
  <circle cx="320" cy="510" r="2"   fill="white" opacity="0.18"/>
  <circle cx="500" cy="500" r="2"   fill="white" opacity="0.18"/>
  <circle cx="750" cy="230" r="2"   fill="white" opacity="0.18"/>
  <circle cx="48"  cy="240" r="2"   fill="white" opacity="0.18"/>
  <circle cx="380" cy="60"  r="2"   fill="#fbbf24" opacity="0.40"/>
  <circle cx="425" cy="52"  r="1.5" fill="#fbbf24" opacity="0.35"/>
  <circle cx="450" cy="70"  r="1.5" fill="#fbbf24" opacity="0.30"/>

  <!-- ══ ETHIOPIAN FLAG STRIPE ══ -->
  <rect x="0"   y="572" width="267" height="28" fill="#16a34a" opacity="0.70"/>
  <rect x="267" y="572" width="266" height="28" fill="#fbbf24" opacity="0.70"/>
  <rect x="533" y="572" width="267" height="28" fill="#dc2626" opacity="0.70"/>
</svg>
